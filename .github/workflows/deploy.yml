name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "Missing secret VPS_HOST" && exit 1)
          test -n "${{ secrets.VPS_USERNAME }}" || (echo "Missing secret VPS_USERNAME" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "Missing secret VPS_SSH_KEY" && exit 1)
          test -n "${{ secrets.API_KEYS }}" || (echo "Missing secret API_KEYS" && exit 1)

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=15 "${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}" "echo ssh_ok"

      - name: Upload production env
        run: |
          cat > .env.production << EOF
          API_KEYS=${{ secrets.API_KEYS }}
          NODE_ENV=production
          PORT=3012
          EOF
          scp .env.production "${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/web-jkt48-radar.env"

      - name: Deploy to VPS
        run: |
          ssh "${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}" "bash -s" << 'EOF'
            set -e
            APP_DIR=/var/www/web-jkt48-radar

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/mmriz16/web-jkt48-radar.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            git clean -fd
            mv /tmp/web-jkt48-radar.env .env.production
            npm install
            npm run build
            pm2 delete web-jkt48-radar || true
            PORT=3012 pm2 start npm --name web-jkt48-radar -- start
            pm2 save
          EOF
