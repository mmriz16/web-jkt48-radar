name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR=/var/www/web-jkt48-radar

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/mmriz16/web-jkt48-radar.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git checkout main
            git pull --ff-only origin main

            npm install

            cat > .env.production << EOF
            API_KEYS=${{ secrets.API_KEYS }}
            NODE_ENV=production
            PORT=3012
            EOF

            npm run build
            pm2 delete web-jkt48-radar || true
            PORT=3012 pm2 start npm --name web-jkt48-radar -- start
            pm2 save
